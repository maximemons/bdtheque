<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BDthèque</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles/dashboard.css">
</head>
<body>
    <!-- Header mobile (hamburger menu) -->
    <header class="header-mobile">
        <i class="fas fa-bars hamburger" id="hamburger"></i>
    </header>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar collapsed" id="sidebar">
            <div class="logo">
                <i class="fas fa-book"></i>
                <span>BDthèque</span>
            </div>
            <ul class="nav-links">
                <li><a href="#"><i class="fas fa-home"></i>Accueil</a></li>
                <li><a href="#"><i class="fas fa-book"></i>Mes BD</a></li>
                <li><a href="#"><i class="fas fa-star"></i>Favoris</a></li>
                <li><a href="#"><i class="fas fa-cog"></i>Paramètres</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="user-card">
                <div class="user-header">
                    <div class="user-avatar" id="userAvatar"></div>
                    <div class="user-info">
                        <h3 id="userName"></h3>
                        <p id="userEmail"></p>
                    </div>
                </div>
                <button id="logoutBtn" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> Se déconnecter
                </button>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <i class="fas fa-book"></i>
                    <h4 id="bdCount">12</h4>
                    <p>BD</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-folder"></i>
                    <h4 id="favCount">4</h4>
                    <p>Collections</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-history"></i>
                    <h4 id="lastReadCount">8</h4>
                    <p>Dernières lectures</p>
                </div>
            </div>

            <div class="content">
                <h2>Mes dernières BD</h2>
                <p>Contenu à personnaliser selon tes besoins.</p>
            </div>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
    
    <script src="../scripts/firebaseConfig.js"></script>
    <script src="../scripts/objects.js"></script>
    <script src="../scripts/bdUtils.js"></script>
    <script src="scripts/dashboard.js"></script>
</body>
</html>
